<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../../favicon.ico" type="image/x-icon">
    <title>FullFilm - Login </title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>

    <div  class="fixed inset-0 z-50">
        <div
          class="absolute inset-0 bg-cover bg-center"
          style="background-image: url('https://i.pinimg.com/1200x/56/51/81/565181f6b45c563cd51d8fde3f9568f3.jpg');">
        </div>
      
        <div class="absolute inset-0 bg-black/80 backdrop-blur-[3px]"></div>
      
        <!-- Login alert -->

        <div  id="alert" style="display:none" class="bg-orange-200 absolute text-orange-800 p-4  flex items-center flex-col w-full mb-10" role="alert">
            <p class="block text-sm font-medium sm:inline max-sm:mt-2">User Name: FullAdmin</p>
            <p class="block text-sm font-medium sm:inline max-sm:mt-2">Email: fulladmin@gmail.com</p>
            <p class="block text-sm font-medium sm:inline max-sm:mt-2">Password: 776</p>
        </div> 

        <!-- login kontent -->

        <div class="relative flex items-center justify-center w-full h-full p-4">
      
            <form class="space-y-6 w-full max-w-md bg-[#0f172b]/90 p-10 rounded-xl shadow-xl">
                <p class="w-full flex justify-center px-2 py-2 text-orange-600 text-3xl font-extrabold">Login Panel</p>
      

                <div  class="flex items-center">
                  <label class="text-white/80 w-36 text-sm">Email</label>
                  <input id="email" type="email" placeholder="Enter your email"   autocomplete="email"
                    class="text-orange-600 w-full px-2 py-2 border-b border-gray-300 focus:border-orange-600 outline-none text-sm" />
                </div>
          
          
                <div  class="flex items-center">
                  <label class="text-white/80 w-36 text-sm">PassWord</label>
                  <input id="password" type="password" placeholder="Enter Password" autocomplete="current-password"
                    class="w-full px-2 py-2 border-b border-gray-300 focus:border-orange-600 outline-none text-sm text-orange-600" />
                </div>
          
                <button id="loginButton" type="button" 
                  class="w-full mt-6 px-6 py-2 bg-orange-600 hover:bg-orange-600/70 text-white text-sm rounded-lg">
                  LOGIrN
                </button>

                <p class="w-full  gap-1 flex justify-end  text-white/80 text-sm">hehehe Daxil Ola bilmirsiniz?  
                  <span id="message" class="underline text-orange-500 hover:cursor-pointer">Klik edin!</span>
                </p>
                

                <div id="error" style="display:none" class="bg-red-300 text-red-900 p-4 rounded-lg" role="alert">
                  <span class="font-semibold text-[15px] inline-block mr-1 ml-20 lg:ml-0">Error!</span>
                  <span class="block text-sm font-medium sm:inline max-sm:mt-2">Email və ya password səhvdir!</span>
                </div>
              </form>
        </div>
      </div>
      <script src="../js/all-act.js"></script>
</body>
</html>
