                            <path
                                d="M287.9 318.583a30.37 30.37 0 0 1-21.257-8.806L8.83 51.963C-2.078 39.225-.595 20.055 12.143 9.146c11.369-9.736 28.136-9.736 39.504 0l259.331 257.813c12.243 11.462 12.876 30.679 1.414 42.922-.456.487-.927.958-1.414 1.414a30.368 30.368 0 0 1-23.078 7.288z"
                                data-original="#000000"></path>
                        </svg>
                    </div>

                    <form class="space-y-4 mt-2 ">
              
                      <div class="grid grid-cols-2 gap-4">
                          <div>
                              <label class="text-white/80 text-sm mb-2 block">Ad</label>
                              <input type="text" placeholder="Film/Serial adı"
                                  class="px-4 py-3 bg-[#081028] w-full text-orange-500 text-sm border-none focus:outline-orange-500/50 focus:bg-transparent rounded-lg" />
                          </div>
                          <div>
                              <label class="text-white/80 text-sm mb-2 block">Janr</label>
                              <input type="text" placeholder="Dram, Komedi..."
                                  class="px-4 py-3 bg-[#081028] w-full text-orange-500 text-sm border-none focus:outline-orange-500/50 focus:bg-transparent rounded-lg" />
                          </div>
                          <div>
                              <label class="text-white/80 text-sm mb-2 block">Rejissor</label>
                              <input type="text" placeholder="Rejissor adı"
                                  class="px-4 py-3 bg-[#081028] w-full text-orange-500 text-sm border-none focus:outline-orange-500/50 focus:bg-transparent rounded-lg" />
                          </div>

                          <div>
                            <label class="text-white/80 text-sm mb-2 block">Baş Rollarda</label>
                            <input type="text" placeholder="Baş rol Aktyorlar"
                                class="px-4 py-3 bg-[#081028] w-full text-orange-500 text-sm border-none focus:outline-orange-500/50 focus:bg-transparent rounded-lg" />
                          </div>
                      </div>

                     

                      <div>
                        <label class="text-white/80 text-sm mb-2 block">Təsvir</label>
                        <input type="text" placeholder="Təsvir yazın"
                            class="px-4 py-3 bg-[#081028] w-full text-orange-500 text-sm border-none focus:outline-orange-500/50 focus:bg-transparent rounded-lg" />
                      </div>
                  
                 
                      <div>   
                          <div class="flex gap-3">
                            <label class="text-white/80 text-sm mb-1 block">Tipi:</label>
                              <label class="flex items-center cursor-pointer">
                                  <input type="radio" name="filmType" value="film" checked onchange="toggleTypeFields()"
                                      class="w-4 h-4 accent-orange-500/50" />
                                  <span class="text-white/80 text-sm ml-2">Film</span>
                              </label>
                              <label class="flex items-center cursor-pointer">
                                  <input type="radio" name="filmType" value="serial" onchange="toggleTypeFields()"
                                      class="w-4 h-4 accent-orange-500/50" />
                                  <span class="text-white/80 text-sm ml-2">Serial</span>
                              </label>
                          </div>
                      </div>
                  
                  
                      <div id="filmDuration" class="block">
                          <label class="text-white/80 text-sm mb-2 block">Müddət (dəqiqə)</label>
                          <input type="number" placeholder="90, 120..."
                              class="px-4 py-3 bg-[#081028] w-full text-orange-500 text-sm border-none focus:outline-orange-500/50 focus:bg-transparent rounded-lg" />
                      </div>
                  
                     
                      <div id="serialInfo" class="hidden grid grid-cols-2 gap-4">
                          <div>
                              <label class="text-white/80 text-sm mb-2 block">Sezon sayı</label>
                              <input type="number" placeholder="1, 2, 3..."
                                  class="px-4 py-3 bg-[#081028] w-full text-orange-500 text-sm border-none focus:outline-orange-500/50 focus:bg-transparent rounded-lg" />
                          </div>
                          <div>
                              <label class="text-white/80 text-sm mb-2 block">Bölüm sayı</label>
                              <input type="number" placeholder="8, 10, 13..."
                                  class="px-4 py-3 bg-[#081028] w-full text-orange-500 text-sm border-none focus:outline-orange-500/50 focus:bg-transparent rounded-lg" />
                          </div>
                      </div>
                         
                      <div>
                          <label class="text-white/80 text-sm mb-2 block">Ssenari</label>
                          <textarea placeholder="Məzmun haqqında..."
                              class="px-4 py-3 bg-[#081028] w-full text-orange-500 text-sm border-none focus:outline-orange-500/50 focus:bg-transparent rounded-lg"
                              rows="3"></textarea>
                      </div>
                  
               
                      <div class="grid grid-cols-2 gap-4">
                          <div>
                              <label class="text-white/80 text-sm mb-2 block">IMDB Reytinq</label>
                              <input type="number" placeholder="1-10" min="1" max="10" step="0.1"
                                  class="px-4 py-3 bg-[#081028] w-full text-orange-500 text-sm border-none focus:outline-orange-500/50 focus:bg-transparent rounded-lg" />
                          </div>
                          <div>
                              <label class="text-white/80 text-sm mb-2 block">Poster</label>
                              <input type="file" accept="image/*"
                                  class="px-4 py-3 bg-[#081028] w-full text-orange-500 text-sm border-none focus:outline-orange-500/50 focus:bg-transparent rounded-lg" />
                          </div>
                      </div>
                  
                  
                      <div class="flex gap-4 !mt-4">
                          <button type="button"
                              class="px-6 py-3 rounded-lg cursor-pointer text-white/80 text-sm font-medium border-none outline-none tracking-wide bg-orange-500/50 hover:bg-orange-500/70 transition">Təstiq et</button>
                          <button id="closeButton" type="button" onclick="CloseButton()"
                              class="px-6 py-3 rounded-lg cursor-pointer text-orange-500 text-sm font-medium border-none outline-none tracking-wide bg-gray-200 hover:bg-gray-300 transition">Ləğv et</button>
                      </div>
                  </form>
                </div>
            </div>
        </div>

    </div>


<script src="../js/all-act.js"></script>
</body>
</html>
