<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" href="../../favicon.ico" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FullFilm - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>

    <div class="relative  bg-[#0f172b] h-full min-h-screen">
        <div class="lg:flex items-start">
          <nav id="sidebar" class="lg:block hidden lg:min-w-[250px] w-max ">
            <div 
              class="bg-[#081028] shadow-lg p-3 h-screen fixed lg:border-r-[2px]  lg:border-orange-600 top-0 left-0 overflow-auto z-[99] lg:w-[220px] transition-all duration-500">
              <div class="flex items-center gap-2 pt-6 pb-2 px-4 bg-[#081028]">
                <h1 class="text-white/80 font-bold text-[35px]">
                  Full<span class="text-orange-500/50">Film </span>
                </h1>
              </div>
  
              <div class="py-4 px-4">
                <ul class="space-y-2">

                  <li>
                    <a href=""
                      class="text-orange-500/50 text-[18px] font-medium flex items-center cursor-pointer hover:bg-orange-500/50 hover:text-white/80 rounded-md px-3 py-2.5 transition-all duration-300">
                      <i class="fa-solid fa-photo-film w-[18px] h-[18px] mr-3"></i>
                      <span class="overflow-hidden text-ellipsis whitespace-nowrap">Ana Səhifə</span>
                    </a>
                    
                  </li>
  
                  <li>
                    <a href="" class="text-orange-500/50 text-[18px] font-medium flex items-center cursor-pointer hover:bg-orange-500/50  hover:text-white/80 rounded-md px-3 py-2.5 transition-all duration-300">
                      <i class="fa-regular fa-newspaper w-[18px] h-[18px] mr-3"></i>
                      <span class="overflow-hidden text-ellipsis whitespace-nowrap">Xəbərlər</span>
                    </a>
                  </li>
  
                  <li>
                    <a href=""
                      class="text-orange-500/50 text-[18px] font-medium flex items-center cursor-pointer hover:bg-orange-500/50  hover:text-white/80 rounded-md px-3 py-2.5 transition-all duration-300">
                      <i class="fa-regular fa-circle-user w-[18px] h-[18px] mr-3"></i>
                      <span class="overflow-hidden text-ellipsis whitespace-nowrap">Profil</span>
                    </a>
                  </li>

                </ul>
              </div>
            </div>
          </nav>
  
          <section class=" w-full ">

            <!-- MOBILE TOP BAR -->
            <div
              class="fixed top-0 left-0 w-full h-[70px] lg:hidden z-50 bg-cover bg-center relative"
              style="background-image: url('https://i.pinimg.com/1200x/56/51/81/565181f6b45c563cd51d8fde3f9568f3.jpg');">
              <div class="absolute inset-0 bg-black/70"></div>
            
              <h1 class="absolute left-4 top-1/2 -translate-y-1/2 text-white/70 font-bold text-[25px] z-10">
                Full<span class="text-orange-500/70">Film</span>
              </h1>
            
              <button  onclick="toggleSidebarMenu()"
              class="absolute right-4 top-1/2 -translate-y-1/2 bg-[#081028] px-3 py-1 rounded-lg text-white/80 z-10">
                <i class="fa-solid fa-bars"></i>
              </button>
            </div>
            
            <!-- DESKTOP HEADER -->
            <header class="sticky top-0 px-6 z-40 bg-[#0f172b] pt-4 sm:mt-0">
              <div class="flex items-center px-6 py-2 bg-orange-500/50 shadow-md rounded-md lg:mt-7">
            
                <div class="flex items-center w-full ">
                  <div class="flex items-center gap-4 w-full">
            

                    <div class="flex items-center gap-3 w-full">
                      <i class="fa-solid fa-magnifying-glass w-5 text-white/80 text-xl"></i>
                      
                      <input type="text" placeholder="Search something..." class="w-full p-2 text-sm bg-transparent outline-none text-white/80 " />
                    </div>
                  </div>
                </div>
              </div>
            </header>

            <div class="my-6 px-6">
              <div class="flex justify-between gap-6 flex-wrap items-center  ml-auto">
                <h1 id="panelName" class="font-bold text-white/80">Dashboard/</h1>
                <div onclick="CloseButton()" class="flex items-center   gap-2 p-3 rounded-md bg-orange-500/50 font-bold text-white/80 hover:cursor-pointer">
                  <i class="fa-solid fa-plus w-5 h-5 cursor-pointer text-white/80 font-bold"></i>
                      Əlavə et 
                 </div>

                 <!-- main - TABLE -->

                <section class="main-content w-full overflow-auto rounded-md">
                    <div class="flex ">
                      <table class="min-w-full bg-[#0b1739] ">

                        <thead class="bg-orange-500/50 whitespace-nowrap">
                          <tr>
                            <th class="p-4 text-left text-sm font-medium text-white/80">
                              Adı
                            </th>
                            <th class="p-4 text-left text-sm font-medium text-white/80">
                              Janr
                            </th>
                            <th class="p-4 text-left text-sm font-medium text-white/80">
                              IMDB Reytinq 
                            </th>

                            <th class="p-4 text-left text-sm font-medium text-white/80">
                              Tipi
                            </th>

                            
                            <th class="p-4 text-left text-sm font-medium text-white/80">
                              Digər Məlumatlar
                            </th>
                            
                            <th class="p-4 text-left text-sm font-medium text-white/80">
                              Redaktə et
                            </th>
                          </tr>
                        </thead>
        
                        <tbody class="whitespace-nowrap">
                          <tr class="even:bg-blue-50">
                            <td class="p-4 text-sm text-white/80">
                              John Doe
                            </td>
                            <td class="p-4 text-sm text-white/80">
                              john@example.com
                            </td>
                            <td class="p-4 text-sm text-white/80">
                              Admin
                            </td>
                            <td class="p-4 text-sm text-white/80">
                              2022-05-15
                            </td>
                            <td class="p-4 text-sm text-white/80">
                              2022-05-15
                            </td>
                            <td class="p-4">
                              <button class="mr-4" title="Edit">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 fill-blue-500 hover:fill-blue-700"
                                  viewBox="0 0 348.882 348.882">
                                  <path
                                    d="m333.988 11.758-.42-.383A43.363 43.363 0 0 0 304.258 0a43.579 43.579 0 0 0-32.104 14.153L116.803 184.231a14.993 14.993 0 0 0-3.154 5.37l-18.267 54.762c-2.112 6.331-1.052 13.333 2.835 18.729 3.918 5.438 10.23 8.685 16.886 8.685h.001c2.879 0 5.693-.592 8.362-1.76l52.89-23.138a14.985 14.985 0 0 0 5.063-3.626L336.771 73.176c16.166-17.697 14.919-45.247-2.783-61.418zM130.381 234.247l10.719-32.134.904-.99 20.316 18.556-.904.99-31.035 13.578zm184.24-181.304L182.553 197.53l-20.316-18.556L294.305 34.386c2.583-2.828 6.118-4.386 9.954-4.386 3.365 0 6.588 1.252 9.082 3.53l.419.383c5.484 5.009 5.87 13.546.861 19.03z"
                                    data-original="#000000" />
                                  <path
                                    d="M303.85 138.388c-8.284 0-15 6.716-15 15v127.347c0 21.034-17.113 38.147-38.147 38.147H68.904c-21.035 0-38.147-17.113-38.147-38.147V100.413c0-21.034 17.113-38.147 38.147-38.147h131.587c8.284 0 15-6.716 15-15s-6.716-15-15-15H68.904C31.327 32.266.757 62.837.757 100.413v180.321c0 37.576 30.571 68.147 68.147 68.147h181.798c37.576 0 68.147-30.571 68.147-68.147V153.388c.001-8.284-6.715-15-14.999-15z"
                                    data-original="#000000" />
                                </svg>
                              </button>
                              <button class="mr-4" title="Delete">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 fill-red-500 hover:fill-red-700"
                                  viewBox="0 0 24 24">
                                  <path
                                    d="M19 7a1 1 0 0 0-1 1v11.191A1.92 1.92 0 0 1 15.99 21H8.01A1.92 1.92 0 0 1 6 19.191V8a1 1 0 0 0-2 0v11.191A3.918 3.918 0 0 0 8.01 23h7.98A3.918 3.918 0 0 0 20 19.191V8a1 1 0 0 0-1-1Zm1-3h-4V2a1 1 0 0 0-1-1H9a1 1 0 0 0-1 1v2H4a1 1 0 0 0 0 2h16a1 1 0 0 0 0-2ZM10 4V3h4v1Z"
                                    data-original="#000000" />
                                  <path d="M11 17v-7a1 1 0 0 0-2 0v7a1 1 0 0 0 2 0Zm4 0v-7a1 1 0 0 0-2 0v7a1 1 0 0 0 2 0Z"
                                    data-original="#000000" />
                                </svg>
                              </button>
                            </td>
                          </tr>
        
                        </tbody>
                      </table>
                    </div>
                </section>

              </div>
            </div>
          </section>
        </div>
      </div>


<!-- Modal -->

    <div>
        <div id="modal" style="display:none">
            <div
                class="fixed inset-0 p-4 flex flex-wrap justify-center items-center w-full h-full z-[1000] before:fixed before:inset-0 before:w-full before:h-full before:bg-[rgba(0,0,0,0.8)] backdrop-blur-[3px] overflow-auto">
                <div class="w-full max-w-lg bg-[#0f172b] shadow-lg rounded-lg py-6 px-10 relative">
                    <div class="flex items-center">
                        <h3 class="text-orange-500/50 text-xl font-semibold flex-1">Yeni Kontent Əlavə Et
                        </h3>
                        <svg id="closeIcon" onclick="CloseButton()" xmlns="http://www.w3.org/2000/svg"
                            class="w-3.5 h-3.5 ml-2 cursor-pointer shrink-0 fill-gray-400 hover:fill-red-500"
                            viewBox="0 0 320.591 320.591">
                            <path
                                d="M30.391 318.583a30.37 30.37 0 0 1-21.56-7.288c-11.774-11.844-11.774-30.973 0-42.817L266.643 10.665c12.246-11.459 31.462-10.822 42.921 1.424 10.362 11.074 10.966 28.095 1.414 39.875L51.647 311.295a30.366 30.366 0 0 1-21.256 7.288z"
                                data-original="#000000"></path>
                            <path
                                d="M287.9 318.583a30.37 30.37 0 0 1-21.257-8.806L8.83 51.963C-2.078 39.225-.595 20.055 12.143 9.146c11.369-9.736 28.136-9.736 39.504 0l259.331 257.813c12.243 11.462 12.876 30.679 1.414 42.922-.456.487-.927.958-1.414 1.414a30.368 30.368 0 0 1-23.078 7.288z"
                                data-original="#000000"></path>
                        </svg>
                    </div>

                    <form class="space-y-4 mt-2 ">
              
                      <div class="grid grid-cols-2 gap-4">
                          <div>
                              <label class="text-white/80 text-sm mb-2 block">Ad</label>
                              <input type="text" placeholder="Film/Serial adı"
                                  class="px-4 py-3 bg-[#081028] w-full text-orange-500 text-sm border-none focus:outline-orange-500/50 focus:bg-transparent rounded-lg" />
                          </div>
                          <div>
                              <label class="text-white/80 text-sm mb-2 block">Janr</label>
                              <input type="text" placeholder="Dram, Komedi..."
                                  class="px-4 py-3 bg-[#081028] w-full text-orange-500 text-sm border-none focus:outline-orange-500/50 focus:bg-transparent rounded-lg" />
                          </div>
                          <div>
                              <label class="text-white/80 text-sm mb-2 block">Rejissor</label>
                              <input type="text" placeholder="Rejissor adı"
                                  class="px-4 py-3 bg-[#081028] w-full text-orange-500 text-sm border-none focus:outline-orange-500/50 focus:bg-transparent rounded-lg" />
                          </div>

                          <div>
                            <label class="text-white/80 text-sm mb-2 block">Baş Rollarda</label>
                            <input type="text" placeholder="Baş rol Aktyorlar"
                                class="px-4 py-3 bg-[#081028] w-full text-orange-500 text-sm border-none focus:outline-orange-500/50 focus:bg-transparent rounded-lg" />
                          </div>
                      </div>

                     

                      <div>
                        <label class="text-white/80 text-sm mb-2 block">Təsvir</label>
                        <input type="text" placeholder="Təsvir yazın"
                            class="px-4 py-3 bg-[#081028] w-full text-orange-500 text-sm border-none focus:outline-orange-500/50 focus:bg-transparent rounded-lg" />
                      </div>
                  
                 
                      <div>   
                          <div class="flex gap-3">
                            <label class="text-white/80 text-sm mb-1 block">Tipi:</label>
                              <label class="flex items-center cursor-pointer">
                                  <input type="radio" name="filmType" value="film" checked onchange="toggleTypeFields()"
                                      class="w-4 h-4 accent-orange-500/50" />
                                  <span class="text-white/80 text-sm ml-2">Film</span>
                              </label>
                              <label class="flex items-center cursor-pointer">
                                  <input type="radio" name="filmType" value="serial" onchange="toggleTypeFields()"
                                      class="w-4 h-4 accent-orange-500/50" />
                                  <span class="text-white/80 text-sm ml-2">Serial</span>
                              </label>
                          </div>
                      </div>
                  
                  
                      <div id="filmDuration" class="block">
                          <label class="text-white/80 text-sm mb-2 block">Müddət (dəqiqə)</label>
                          <input type="number" placeholder="90, 120..."
                              class="px-4 py-3 bg-[#081028] w-full text-orange-500 text-sm border-none focus:outline-orange-500/50 focus:bg-transparent rounded-lg" />
                      </div>
                  
                     
                      <div id="serialInfo" class="hidden grid grid-cols-2 gap-4">
                          <div>
                              <label class="text-white/80 text-sm mb-2 block">Sezon sayı</label>
                              <input type="number" placeholder="1, 2, 3..."
                                  class="px-4 py-3 bg-[#081028] w-full text-orange-500 text-sm border-none focus:outline-orange-500/50 focus:bg-transparent rounded-lg" />
                          </div>
                          <div>
                              <label class="text-white/80 text-sm mb-2 block">Bölüm sayı</label>
                              <input type="number" placeholder="8, 10, 13..."
                                  class="px-4 py-3 bg-[#081028] w-full text-orange-500 text-sm border-none focus:outline-orange-500/50 focus:bg-transparent rounded-lg" />
                          </div>
                      </div>
                         
                      <div>
                          <label class="text-white/80 text-sm mb-2 block">Ssenari</label>
                          <textarea placeholder="Məzmun haqqında..."
                              class="px-4 py-3 bg-[#081028] w-full text-orange-500 text-sm border-none focus:outline-orange-500/50 focus:bg-transparent rounded-lg"
                              rows="3"></textarea>
                      </div>
                  
               
                      <div class="grid grid-cols-2 gap-4">
                          <div>
                              <label class="text-white/80 text-sm mb-2 block">IMDB Reytinq</label>
                              <input type="number" placeholder="1-10" min="1" max="10" step="0.1"
                                  class="px-4 py-3 bg-[#081028] w-full text-orange-500 text-sm border-none focus:outline-orange-500/50 focus:bg-transparent rounded-lg" />
                          </div>
                          <div>
                              <label class="text-white/80 text-sm mb-2 block">Poster</label>
                              <input type="file" accept="image/*"
                                  class="px-4 py-3 bg-[#081028] w-full text-orange-500 text-sm border-none focus:outline-orange-500/50 focus:bg-transparent rounded-lg" />
                          </div>
                      </div>
                  
                  
                      <div class="flex gap-4 !mt-4">
                          <button type="button"
                              class="px-6 py-3 rounded-lg cursor-pointer text-white/80 text-sm font-medium border-none outline-none tracking-wide bg-orange-500/50 hover:bg-orange-500/70 transition">Təstiq et</button>
                          <button id="closeButton" type="button" onclick="CloseButton()"
                              class="px-6 py-3 rounded-lg cursor-pointer text-orange-500 text-sm font-medium border-none outline-none tracking-wide bg-gray-200 hover:bg-gray-300 transition">Ləğv et</button>
                      </div>
                  </form>
                </div>
            </div>
        </div>

    </div>


<script src="../js/all-act.js"></script>
</body>
</html>
